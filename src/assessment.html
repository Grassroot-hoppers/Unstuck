function normalizeFacetKey(domain, facetNum) {
  return domain + String(facetNum);
}

function clampLikert(n) {
  return Math.max(1, Math.min(5, Math.round(Number(n))));
}

window.buildFixtureAnswersFromFacetMeans = function (facetMeans) {
  const answers = {};
  for (const item of window.UNSTUCK_ITEMS) {
    const code = normalizeFacetKey(item.domain, item.facet);
    const T = facetMeans[code];
    if (T === undefined) {
      throw new Error('Missing facet mean for ' + code);
    }
    const r =
      item.keyed === 'minus'
        ? clampLikert(6 - T)
        : clampLikert(T);
    answers[item.num] = r;
  }
  return answers;
};

<script>

// ============================================================
// SHUFFLE (Fisher-Yates)
// ============================================================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// STORAGE — in-memory store (persists within session)
// ============================================================
const memoryStore = {};

function saveState() {
  memoryStore[STORAGE_KEY] = JSON.stringify(state);
}

function loadState() {
  try {
    const saved = memoryStore[STORAGE_KEY];
    if (saved) return JSON.parse(saved);
  } catch (e) { }
  return null;
}

function clearState() {
  delete memoryStore[STORAGE_KEY];
}

const AUTOPLAY_CLICK_GAP_MS = 40;
const PAGE_DWELL_MS = 1000;

function sleep(ms) {
  return new Promise((r) => setTimeout(r, ms));
}

function getAnswersForAutoplay() {
  if (state.fixtureId) {
    return UnstuckTestPersonas.getFixtureAnswers(state.fixtureId);
  }
  const neutral = 3;
  const map = {};
  for (const it of ITEMS) {
    map[it.num] = neutral;
  }
  return map;
}

async function runAutoplayForVisiblePage(answersMap) {
  const container = document.getElementById("questions-container");
  if (!container) return;

  const blocks = container.querySelectorAll(".question-block");
  for (const block of blocks) {
    const itemNum = parseInt(block.getAttribute("data-item-num"), 10);
    const target = answersMap[itemNum];
    const btn = block.querySelector(
      `.option-btn[data-item="${itemNum}"][data-value="${target}"]`
    );
    if (btn) {
      btn.click();
      await sleep(AUTOPLAY_CLICK_GAP_MS);
    }
  }

  await sleep(PAGE_DWELL_MS);

  const nextBtn = document.getElementById("next-btn");
  if (nextBtn && !nextBtn.disabled) {
    nextBtn.click();
  }
}

function startAutoplayIfNeeded() {
  const shouldRunFixture =
    state.fixtureId && state.phase === "assess" && state.currentPage === 0;
  const page0Auto =
    state.debugShort &&
    state.debugManualDone &&
    state.phase === "assess" &&
    state.currentPage === 0;
  const pageAuto =
    state.debugShort &&
    state.debugManualDone &&
    state.phase === "assess" &&
    state.currentPage > 0;
  const fixtureRest =
    state.fixtureId && state.phase === "assess" && state.currentPage > 0;

  if (!(shouldRunFixture || page0Auto || pageAuto || fixtureRest)) return;

  const answersMap = getAnswersForAutoplay();
  runAutoplayForVisiblePage(answersMap).catch((e) =>
    console.error("Autoplay failed", e)
  );
}

// ============================================================
// SCORING
// ============================================================
function scoreItem(item, response) {
  if (item.keyed === "minus") return 6 - response;
  return response;
}

function computeScores() {
  const domains = { N: 0, E: 0, O: 0, A: 0, C: 0 };
  const facets = {};
  // Initialize facets
  for (const d of "NEOAC") {
    facets[d] = {};
    for (let f = 1; f <= 6; f++) facets[d][f] = 0;
  }

  for (const item of ITEMS) {
    const response = state.answers[item.num];
    if (!response) continue;
    const scored = scoreItem(item, response);
    domains[item.domain] += scored;
    facets[item.domain][item.facet] += scored;
  }

  return { domains, facets };
}

// ============================================================
// ENCODE RESULTS FOR URL
// ============================================================
function encodeResults(scores) {
  const data = {
    d: scores.domains,
    f: scores.facets,
    a: state.age,
    g: state.gender
  };
  return btoa(JSON.stringify(data));
}

  ageSelect.addEventListener("change", checkReady);
  genderSelect.addEventListener("change", checkReady);

  if (state.fixtureId && window.UnstuckTestPersonas) {
    const fx = UnstuckTestPersonas.getFixture(state.fixtureId);
    if (fx) {
      ageSelect.value = fx.defaultAge;
      genderSelect.value = fx.defaultGender;
      checkReady();
    }
  }

  beginBtn.addEventListener("click", () => {
    state.age = ageSelect.value;
    state.gender = genderSelect.value;
    state.phase = "assess";
    state.currentPage = 0;
    state.answers = {};
    state.shuffleOrder = shuffleArray(Array.from({ length: 120 }, (_, i) => i));
    state.startTime = Date.now();
    saveState();
    renderAssessment();
  });
}

// ============================================================
// RENDER: RESUME MODAL
// ============================================================
function renderResumeModal(savedState) {
  const answeredCount = Object.keys(savedState.answers || {}).length;
  const pagesComplete = savedState.currentPage || 0;

  app.innerHTML = `
    <div class="resume-overlay">
      <div class="resume-modal">
        <h3>Welcome Back</h3>
        <p>You've answered ${answeredCount} of 120 questions (page ${pagesComplete + 1} of 12). Pick up where you left off?</p>
        <div class="resume-modal__actions">
          <button class="btn btn--secondary" id="start-fresh-btn">Start Fresh</button>
          <button class="btn btn--primary" id="resume-btn">Resume →</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("resume-btn").addEventListener("click", () => {
    state = savedState;
    if (state.phase === "assess") {
      renderAssessment();
    } else {
      renderPre();
    }
  });

  document.getElementById("start-fresh-btn").addEventListener("click", () => {
    clearState();
    state = {
      phase: "pre",
      age: "",
      gender: "",
      currentPage: 0,
      answers: {},
      shuffleOrder: [],
      startTime: null,
      fixtureId: null,
      debugShort: false,
      debugManualDone: false,
    };
    renderPre();
  });
}

// ============================================================
// RENDER: ASSESSMENT
// ============================================================
function renderAssessment() {
  document.getElementById("footer").style.display = "none";
  const pageIndex = state.currentPage;
  const start = pageIndex * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  const pageItemIndices = state.shuffleOrder.slice(start, end);
  const pageItems = pageItemIndices.map(i => ITEMS[i]);
  const debugManualPhase =
    state.debugShort && !state.debugManualDone && pageIndex === 0;
  const visibleItems = debugManualPhase ? pageItems.slice(0, 5) : pageItems;
  const percent = Math.round((pageIndex / TOTAL_PAGES) * 100);
  const answeredTotal = Object.keys(state.answers).length;
  const minutesPerItem = 0.083; // ~5 seconds per item
  const remainingItems = 120 - answeredTotal;
  const minutesLeft = Math.max(1, Math.ceil(remainingItems * minutesPerItem));

  app.innerHTML = `
    <div class="progress-bar">
      <div class="progress-bar__inner">
        <div class="progress-bar__text">
          <span>Page ${pageIndex + 1} of ${TOTAL_PAGES} — ${percent}% complete</span>
          <span>~${minutesLeft} min remaining</span>
        </div>
        <div class="progress-bar__track">
          <div class="progress-bar__fill" style="width: ${percent}%"></div>
        </div>
      </div>
    </div>

    <div class="questions-page" id="questions-container">
      ${visibleItems.map((item, idx) => `
        <div class="question-block" data-item-num="${item.num}">
          <div class="question__number">${start + idx + 1} of 120</div>
          <div class="question__text">I ${item.text.charAt(0).toLowerCase() + item.text.slice(1)}.</div>
          <div class="question__options">
            ${OPTIONS.map(opt => `
              <button class="option-btn ${state.answers[item.num] === opt.value ? 'option-btn--selected' : ''}"
                      data-item="${item.num}" data-value="${opt.value}">
                ${opt.label}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}

      <div class="nav-buttons">
        ${pageIndex > 0 ? '<button class="btn btn--ghost" id="back-btn">← Back</button>' : '<div></div>'}
        <button class="btn btn--primary" id="next-btn" disabled>
          ${pageIndex === TOTAL_PAGES - 1 ? 'Finish →' : 'Next →'}
        </button>
      </div>
    </div>
  `;

  // Scroll to top
  window.scrollTo(0, 0);

  // Wire up option buttons
  const container = document.getElementById("questions-container");
  container.addEventListener("click", (e) => {
    const btn = e.target.closest(".option-btn");
    if (!btn) return;

    const itemNum = parseInt(btn.dataset.item);
    const value = parseInt(btn.dataset.value);

    state.answers[itemNum] = value;

    // Update visual selection
    const block = btn.closest(".question-block");
    block.querySelectorAll(".option-btn").forEach(b => b.classList.remove("option-btn--selected"));
    btn.classList.add("option-btn--selected");

    checkPageComplete();
  });

  // Check if all items on page are answered
  function checkPageComplete() {
    const allAnswered = visibleItems.every(
      (item) => state.answers[item.num] !== undefined
    );
    document.getElementById("next-btn").disabled = !allAnswered;
  }
  checkPageComplete();

  // Next button
  document.getElementById("next-btn").addEventListener("click", () => {
    saveState();
    if (debugManualPhase) {
      state.debugManualDone = true;
      saveState();
      renderAssessment();
      return;
    }
    if (pageIndex === TOTAL_PAGES - 1) {
      // Assessment complete
      state.phase = "calculating";
      saveState();
      renderCalculating();
    } else {
      state.currentPage = pageIndex + 1;
      saveState();
      renderAssessment();
    }
  });

  // Back button
  const backBtn = document.getElementById("back-btn");
  if (backBtn) {
    backBtn.addEventListener("click", () => {
      state.currentPage = pageIndex - 1;
      saveState();
      renderAssessment();
    });
  }

  startAutoplayIfNeeded();
}

// ============================================================
// RENDER: CALCULATING
// ============================================================
function renderCalculating() {
  document.getElementById("footer").style.display = "none";
  app.innerHTML = `
    <div class="calculating">
      <div class="spinner"></div>
      <h2>Calculating your results...</h2>
      <p>Scoring 120 items across 5 domains and 30 facets.</p>
    </div>
  `;

  setTimeout(async () => {
    const scores = computeScores();
    const encoded = encodeResults(scores);
    const scoresPayload = { d: scores.domains, f: scores.facets, a: state.age, g: state.gender };
    const sb = typeof UnstuckSupabase !== 'undefined'
      ? UnstuckSupabase.getSupabaseClient(typeof supabase !== 'undefined' ? supabase : null)
      : null;
    let id = null;
    if (sb && UnstuckSupabase) {
      id = await UnstuckSupabase.saveResultsRow(sb, {
        scoresObj: scoresPayload,
        age_group: state.age,
        gender: state.gender,
      });
    }
    clearState();

    if (id && UnstuckSupabase) {
      UnstuckSupabase.setLastResultId(id);
      window.location.href = 'results.html?id=' + encodeURIComponent(id) + '&new=1';
    } else {
      window.location.href = 'results.html#' + encoded;
    }
  }, 1500);
}

// ============================================================
// INIT
// ============================================================
function init() {
  if (__activeFixtureId || __debugMode) {
    clearState();
    state = {
      phase: "pre",
      age: "",
      gender: "",
      currentPage: 0,
      answers: {},
      shuffleOrder: [],
      startTime: null,
      fixtureId: __activeFixtureId,
      debugShort: __debugMode,
      debugManualDone: false,
    };
    renderPre();
    return;
  }

  const saved = loadState();
  if (saved && saved.phase === "assess" && Object.keys(saved.answers || {}).length > 0) {
    renderResumeModal(saved);
  } else {
    renderPre();
  }
}

init();
</script>
