<script>
// ============================================================
// DOMAIN METADATA
// ============================================================
const DOMAIN_META = {
  N: {
    name: "Your Alarm System",
    scientific: "Neuroticism",
    color: "#C0392B",
    chartLabel: "Alarm System (N)",
    facets: {
      1: "Anxiety", 2: "Anger", 3: "Depression",
      4: "Self-Consciousness", 5: "Immoderation", 6: "Vulnerability"
    }
  },
  E: {
    name: "Your Social Energy",
    scientific: "Extraversion",
    color: "#E67E22",
    chartLabel: "Social Energy (E)",
    facets: {
      1: "Friendliness", 2: "Gregariousness", 3: "Assertiveness",
      4: "Activity Level", 5: "Excitement-Seeking", 6: "Cheerfulness"
    }
  },
  O: {
    name: "Your Curiosity",
    scientific: "Openness",
    color: "#8E44AD",
    chartLabel: "Curiosity (O)",
    facets: {
      1: "Imagination", 2: "Artistic Interests", 3: "Emotionality",
      4: "Adventurousness", 5: "Intellect", 6: "Liberalism"
    }
  },
  A: {
    name: "Your Relationships",
    scientific: "Agreeableness",
    color: "#2D6A4F",
    chartLabel: "Relationships (A)",
    facets: {
      1: "Trust", 2: "Morality", 3: "Altruism",
      4: "Cooperation", 5: "Modesty", 6: "Sympathy"
    }
  },
  C: {
    name: "Your Execution",
    scientific: "Conscientiousness",
    color: "#2C3E50",
    chartLabel: "Execution (C)",
    facets: {
      1: "Self-Efficacy", 2: "Orderliness", 3: "Dutifulness",
      4: "Achievement-Striving", 5: "Self-Discipline", 6: "Cautiousness"
    }
  }
};

// ============================================================
// INTERPRETATION TEXTS
// ============================================================
const INTERPRETATIONS = {
  N: {
    high: "Your alarm system runs hot. You pick up on threats, problems, and emotional signals that others miss — which gives you depth and sensitivity. But it costs energy. Your nervous system is frequently activated, which means you spend significant resources on worry, emotional processing, and threat monitoring. This isn't a flaw — it's a sensitivity setting. The question is whether it's calibrated for your current life, or still set to childhood levels.",
    average: "Your alarm system is moderately active. You experience negative emotions when warranted but generally recover without getting stuck. You have access to emotional sensitivity without being overwhelmed by it. This is a balanced position — though specific facets below may reveal areas where the alarm fires more than you'd expect.",
    low: "Your alarm system runs cool. You're emotionally stable, rarely rattled, and recover quickly from setbacks. This gives you a calm foundation — but watch for the blind spot: low emotional reactivity can sometimes mean you miss important signals or underestimate how situations are affecting you. Stability is a strength until it becomes numbness."
  },
  E: {
    high: "You generate energy from engaging with the world — people, activities, experiences. You're naturally drawn to social situations and tend to be assertive, talkative, and enthusiastic. This is a powerful energy source. The risk: over-reliance on external stimulation can mean you avoid the quiet, reflective work that deeper growth requires.",
    average: "You balance social engagement with solitude comfortably. You enjoy people but also need time alone to recharge. This flexibility is an asset — you can draw energy from both connection and reflection depending on what's needed.",
    low: "You draw energy from solitude, reflection, and quiet environments. Social situations cost energy rather than generate it. This isn't shyness — it's a legitimate energy pattern. Your inner world is rich, and you do your best work with space and silence. The risk: isolation can become avoidance if you're not intentional about maintaining connections."
  },
  O: {
    high: "Your curiosity is one of your strongest energy sources. You're drawn to ideas, beauty, creativity, and new experiences. You think abstractly, question conventions, and see possibilities where others see walls. This drives exploration and growth — but can also create restlessness if you're always seeking and never settling into the work of building.",
    average: "You balance openness to new ideas with practical groundedness. You're curious but not restless, creative but also capable of working within established structures. You can explore when it's useful and focus when it's needed.",
    low: "You prefer the concrete, the practical, and the familiar. You're not drawn to abstract ideas or constant novelty — you'd rather work with what's proven. This gives you stability and focus, but can limit growth if you never expose yourself to perspectives that challenge your current worldview. Sometimes the unfamiliar is exactly what the garden needs."
  },
  A: {
    high: "You navigate relationships with empathy, trust, and a strong instinct for cooperation. You care about others' feelings and go out of your way to maintain harmony. This builds deep connections — but watch for the cost: high agreeableness can mean you avoid necessary conflict, say yes when you mean no, and sacrifice your own needs for others'. Boundaries are your growth edge.",
    average: "You balance empathy with self-interest reasonably well. You can cooperate and compromise but also stand your ground when needed. You're neither a pushover nor abrasive — you adjust your approach based on the situation.",
    low: "You prioritize truth over harmony and self-interest over accommodation. You're comfortable with conflict, direct in communication, and skeptical of others' motives. This gives you independence and clear-headedness — but can cost you in relationships if others experience you as cold, competitive, or dismissive. Connection is built on some degree of warmth."
  },
  C: {
    high: "Your execution engine is strong. You plan, organize, follow through, and maintain discipline naturally. This is the trait most correlated with traditional success — but it can become rigidity if you can't adapt when plans need to change. Your structure serves you until it controls you.",
    average: "You can organize and follow through when motivated, but you're not naturally drawn to rigid structure. You get things done — sometimes efficiently, sometimes last-minute. This is workable, but if you consistently struggle to execute on what matters, external systems and accountability will help more than willpower.",
    low: "Structure, routine, and follow-through don't come naturally to you. You start things but struggle to finish them. You know what to do but can't make yourself do it. This is the single most important pattern to address — not by forcing discipline, but by building external scaffolding: systems, accountability, small commitments, tiny experiments. You need structure around you because you don't generate it internally."
  }
};

// ============================================================
// HELPERS
// ============================================================
function getLevel(score, maxItems) {
  const avg = score / maxItems;
  if (avg > 3.5) return "high";
  if (avg >= 2.5) return "average";
  return "low";
}

function getLevelLabel(level) {
  return level.charAt(0).toUpperCase() + level.slice(1);
}

function domainToPercent(score) {
  return Math.round(((score - 24) / 96) * 100);
}

function facetToPercent(score) {
  return Math.round(((score - 4) / 16) * 100);
}

// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://placeholder.supabase.co'; // TODO: replace with real URL
const SUPABASE_ANON_KEY = 'placeholder'; // TODO: replace with real anon key
let sb = null;
try {
  if (typeof supabase !== 'undefined' && SUPABASE_URL !== 'https://placeholder.supabase.co') {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e) { /* Supabase not available */ }

// ============================================================
// LOAD RESULTS: SUPABASE (by ID) or URL HASH (fallback)
// ============================================================
async function loadResults() {
  // Check for Supabase short ID in query params: ?id=abc123
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (id && sb) {
    try {
      const { data, error } = await sb
        .from('results')
        .select('scores, age_group, gender, created_at')
        .eq('id', id)
        .single();

      if (data && !error) {
        return {
          ...data.scores,
          _permalink: `${window.location.origin}${window.location.pathname}?id=${id}`,
          _savedAt: data.created_at,
          _id: id
        };
      }
    } catch(e) {
      console.warn('Supabase load failed, trying hash fallback:', e.message);
    }
  }

  // Fallback: read from URL hash (base64 encoded)
  const hash = window.location.hash.slice(1);
  if (hash) {
    try {
      const decoded = JSON.parse(atob(hash));
      decoded._permalink = window.location.href;
      return decoded;
    } catch(e) { /* invalid hash */ }
  }

  return null;
}

// ============================================================
// RENDER
// ============================================================
async function render() {
  const data = await loadResults();
  const app = document.getElementById("app");

  if (!data || !data.d) {
    app.innerHTML = `
      <div class="pre-assess" style="min-height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 class="pre-assess__title">No Results Found</h1>
        <p class="pre-assess__desc">
          It looks like you haven't taken the assessment yet, or the link is invalid.
        </p>
        <a href="assessment.html" class="btn btn--primary btn--lg">Take the Assessment →</a>
      </div>
    `;
    return;
  }

  const { d: domains, f: facets, a: age, g: gender } = data;
  const domainOrder = ["N", "E", "O", "A", "C"];

  // Build domain blocks HTML
  const domainBlocksHTML = domainOrder.map(key => {
    const meta = DOMAIN_META[key];
    const score = domains[key];
    const avg = (score / 24).toFixed(1);
    const level = getLevel(score, 24);

    // Facets
    const facetHTML = Object.keys(meta.facets).map(fn => {
      const fScore = facets[key][fn];
      const fAvg = (fScore / 4).toFixed(1);
      const fLevel = getLevel(fScore, 4);
      const fPercent = facetToPercent(fScore);
      return `
        <div class="facet-card">
          <div class="facet-card__name">${meta.facets[fn]}</div>
          <div class="facet-card__score">${fScore}/20 · ${fAvg}/5.0 · <span class="level-badge level-badge--${fLevel}" style="padding: 0.125rem 0.5rem;">${getLevelLabel(fLevel)}</span></div>
          <div class="facet-card__bar"><div class="facet-card__bar-fill" style="width: ${fPercent}%"></div></div>
        </div>
      `;
    }).join('');

    return `
      <div class="domain-block domain-block--${key}">
        <div class="domain-block__header">
          <h3 class="domain-block__name">${meta.name}</h3>
          <span class="domain-block__scientific">${meta.scientific}</span>
        </div>
        <div class="domain-block__scores">
          <div class="domain-block__score"><strong>${score}</strong> / 120</div>
          <div class="domain-block__score"><strong>${avg}</strong> / 5.0</div>
          <span class="level-badge level-badge--${level}">${getLevelLabel(level)}</span>
        </div>
        <p class="domain-block__interp">${INTERPRETATIONS[key][level]}</p>
        <div class="facets-grid">${facetHTML}</div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="container--wide">
      <!-- Header -->
      <div class="results-header">
        <h1 class="results-header__title">Your Vitality Profile</h1>
        <p class="results-header__sub">IPIP-NEO-120 · ${age ? 'Age ' + age : ''} ${gender ? '· ' + gender.charAt(0).toUpperCase() + gender.slice(1) : ''}</p>
      </div>

      <!-- Radar Chart -->
      <div class="radar-section">
        <div class="radar-wrap">
          <canvas id="radar-chart"></canvas>
        </div>
      </div>

      <!-- Domain Results -->
      ${domainBlocksHTML}

      <!-- Share -->
      <div class="share-section no-print">
        <h3>Share Your Results</h3>
        <div class="share-url-box">
          <input type="text" id="share-url" readonly value="${data._permalink || window.location.href}">
          <button class="btn btn--secondary btn--sm" id="copy-btn">Copy</button>
        </div>
        ${data._id ? `<p style="margin-top: 0.5rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);">Result ID: ${data._id} · Saved permanently</p>` : '<p style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">Bookmark this link to save your results.</p>'}
        <div class="share-actions">
          <button class="btn btn--primary" id="pdf-btn">Download PDF</button>
          <a href="assessment.html" class="btn btn--secondary">Retake Assessment</a>
        </div>
      </div>

      <!-- What's Next -->
      <div class="next-section">
        <h3>What's Next</h3>
        <p><strong>This is Step 1 — you've surveyed the garden.</strong></p>
        <p>Steps 2–5 are coming: dig into your past patterns, cross-examine what's not serving you, forecast where this is heading, and pick up the tools to fix it.</p>
        <p>For now: sit with these results. Notice what surprises you. Notice what you already knew.</p>
        <p><a href="index.html">Learn more about the full journey →</a></p>
      </div>

      <!-- Citations -->
      <div class="citations">
        <p>Based on IPIP-NEO-120 (Johnson, 2014). Items from <a href="https://ipip.ori.org/" target="_blank" rel="noopener">ipip.ori.org</a> (public domain).</p>
        <p>This is a self-discovery tool, not a clinical diagnostic instrument.</p>
      </div>
    </div>
  `;

  // --- Render Radar Chart ---
  const ctx = document.getElementById("radar-chart").getContext("2d");
  // Use shorter labels on small screens
  const isMobile = window.innerWidth < 600;
  const chartLabels = domainOrder.map(k => {
    if (isMobile) {
      const short = { N: 'Alarm (N)', E: 'Social (E)', O: 'Curiosity (O)', A: 'Relate (A)', C: 'Execute (C)' };
      return short[k];
    }
    return DOMAIN_META[k].chartLabel;
  });
  const chartData = domainOrder.map(k => domainToPercent(domains[k]));

  new Chart(ctx, {
    type: "radar",
    data: {
      labels: chartLabels,
      datasets: [{
        label: "Your Profile",
        data: chartData,
        backgroundColor: "rgba(45, 106, 79, 0.15)",
        borderColor: "#2D6A4F",
        borderWidth: 2.5,
        pointBackgroundColor: "#2D6A4F",
        pointBorderColor: "#fff",
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ctx.parsed.r + '%';
            }
          }
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: {
            stepSize: 25,
            font: { family: "'JetBrains Mono', monospace", size: 10 },
            color: "#7A7A7A",
            backdropColor: "transparent"
          },
          grid: {
            color: "rgba(214, 208, 198, 0.6)"
          },
          angleLines: {
            color: "rgba(214, 208, 198, 0.6)"
          },
          pointLabels: {
            font: {
              family: "'Inter', sans-serif",
              size: 12,
              weight: "600"
            },
            color: "#1A1A1A"
          }
        }
      }
    }
  });

  // --- Copy URL ---
  document.getElementById("copy-btn").addEventListener("click", () => {
    const urlInput = document.getElementById("share-url");
    urlInput.select();
    navigator.clipboard.writeText(urlInput.value).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 2000);
    }).catch(() => {
      document.execCommand("copy");
    });
  });

  // --- PDF Download ---
  document.getElementById("pdf-btn").addEventListener("click", () => {
    window.print();
  });
}

// ============================================================
// INIT
// ============================================================
render().catch(e => console.error('Render error:', e));
</script>
