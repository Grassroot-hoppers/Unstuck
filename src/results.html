// ============================================================
// HELPERS
// ============================================================
function getLevel(score, maxItems) {
  const avg = score / maxItems;
  if (avg > 3.5) return "high";
  if (avg >= 2.5) return "average";
  return "low";
}

function getLevelLabel(level) {
  return level.charAt(0).toUpperCase() + level.slice(1);
}

function domainToPercent(score) {
  return Math.round(((score - 24) / 96) * 100);
}

function facetToPercent(score) {
  return Math.round(((score - 4) / 16) * 100);
}

// ============================================================
// PAYWALL: ACCESS CODE VALIDATION
// ============================================================
async function validateCode(code, resultId) {
  if (!sb) return { valid: false, message: 'Database not available.' };

  // Check if code exists and is unused
  const { data, error } = await sb
    .from('access_codes')
    .select('id, code, used_by')
    .eq('code', code.toUpperCase().trim())
    .single();

  if (error || !data) return { valid: false, message: 'Code not found.' };
  if (data.used_by) return { valid: false, message: 'This code has already been used.' };

  // Claim the code
  const { error: updateError } = await sb
    .from('access_codes')
    .update({ used_by: resultId, used_at: new Date().toISOString() })
    .eq('code', code.toUpperCase().trim());

  if (updateError) return { valid: false, message: 'Error applying code. Please try again.' };

  // Unlock the results
  const { error: unlockError } = await sb
    .from('results')
    .update({ unlocked: true })
    .eq('id', resultId);

  if (unlockError) return { valid: false, message: 'Error unlocking results. Please try again.' };

  return { valid: true, message: 'Code applied! Unlocking your full interpretation...' };
}

function performUnlock() {
  // Remove locked class from all interpretation paragraphs (instant unblur)
  document.querySelectorAll('.interp-locked').forEach(el => {
    el.classList.add('interp-unlocking');
    el.classList.remove('interp-locked');
    // After animation, remove the unlocking class
    el.addEventListener('animationend', () => {
      el.classList.remove('interp-unlocking');
      el.style.maxHeight = 'none';
    }, { once: true });
  });

  // Hide the paywall card
  const paywallCard = document.getElementById('paywall-card');
  if (paywallCard) paywallCard.style.display = 'none';

  // Enable the PDF button
  const pdfBtn = document.getElementById('pdf-btn');
  if (pdfBtn) {
    pdfBtn.classList.remove('btn--disabled');
    pdfBtn.removeAttribute('title');
    pdfBtn.textContent = 'Download PDF';
  }

  // Show unlock banner
  const banner = document.createElement('div');
  banner.className = 'unlock-banner no-print';
  banner.textContent = '✓ Full interpretation unlocked';
  document.body.insertBefore(banner, document.body.firstChild);
  setTimeout(() => { banner.style.opacity = '0'; banner.style.transition = 'opacity 0.5s'; }, 4000);
  setTimeout(() => { banner.remove(); }, 4500);
}

// LOAD RESULTS: SUPABASE (by ID) or URL HASH (fallback)
// ============================================================
async function loadResults() {
  // Check for Supabase short ID in query params: ?id=abc123
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  // Check for Stripe success redirect: ?id=abc123&unlocked=true
  // This auto-unlocks after a successful payment redirect
  const stripeUnlock = params.get('unlocked') === 'true';
  if (stripeUnlock && id && sb) {
    try {
      await sb.from('results').update({ unlocked: true }).eq('id', id);
      // Clean URL to remove the unlocked param
      const cleanUrl = `${window.location.pathname}?id=${id}`;
      window.history.replaceState({}, '', cleanUrl);
    } catch(e) { /* best-effort */ }
  }

  if (id && sb) {
    try {
      const { data, error } = await sb
        .from('results')
        .select('scores, age_group, gender, created_at, unlocked')
        .eq('id', id)
        .single();

      if (data && !error) {
        return {
          ...data.scores,
          _permalink: `${window.location.origin}${window.location.pathname}?id=${id}`,
          _savedAt: data.created_at,
          _id: id,
          _unlocked: data.unlocked || false
        };
      }
    } catch(e) {
      console.warn('Supabase load failed, trying hash fallback:', e.message);
    }
  }

  // Fallback: read from URL hash (base64 encoded)
  // Hash-based URLs are pre-paywall users — treat as unlocked
  const hash = window.location.hash.slice(1);
  if (hash) {
    try {
      const decoded = JSON.parse(atob(hash));
      decoded._permalink = window.location.href;
      decoded._unlocked = true; // backward compat: hash users see everything
      return decoded;
    } catch(e) { /* invalid hash */ }
  }

  return null;
}

      }
    };

    codeBtn.addEventListener('click', handleCodeSubmit);
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleCodeSubmit();
    });
  }

  // --- Research Opt-In ---
  const optinBtn = document.getElementById("optin-btn");
  const optoutBtn = document.getElementById("optout-btn");
  if (optinBtn && data._id && sb) {
    optinBtn.addEventListener("click", async () => {
      try {
        const { error } = await sb
          .from('results')
          .update({ opt_in_research: true })
          .eq('id', data._id);
        const status = document.getElementById("optin-status");
        if (!error) {
          status.textContent = "✓ Thank you. Your anonymized scores are now part of the research pool.";
          status.style.display = "block";
          document.getElementById("research-section").querySelector("div").style.display = "none";
        } else {
          status.textContent = "Something went wrong. Your results are still saved — just not in the research pool.";
          status.style.color = "#B85C38";
          status.style.display = "block";
        }
      } catch(e) {
        console.warn("Opt-in failed:", e);
      }
    });
    optoutBtn.addEventListener("click", () => {
      document.getElementById("research-section").style.display = "none";
    });
  }
}

// ============================================================
// INIT
// ============================================================
render().catch(e => console.error('Render error:', e));
</script>

</body>
</html>
